name: Discord Notify

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"**[${{ github.repository }}]** ${{ github.actor }}의 ${{ github.event_name }} 이벤트가 발생했어요!\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
